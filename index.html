<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhaliwal Global Ventures</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #d1d8e0 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; color: #2d3436;
        }
        .card {
            background: white; padding: 40px 30px; border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 380px; width: 90%; text-align: center;
        }
        .logo-circle {
            width: 90px; height: 90px; background: #2d3436; color: white;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; font-size: 1.8rem; font-weight: bold; 
            margin: 0 auto 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        h1 { margin: 10px 0; font-size: 1.7rem; letter-spacing: -0.5px; }
        p { color: #636e72; margin-bottom: 25px; line-height: 1.5; }
        
        .btn-container { display: flex; flex-direction: column; gap: 12px; }
        
        .btn {
            display: block; padding: 14px; border-radius: 12px;
            text-decoration: none; font-weight: 600; transition: 0.3s;
            font-size: 1rem;
        }
        .btn-insta { 
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white; 
        }
        .btn-email { background: #2d3436; color: white; }
        
        .btn:hover { transform: translateY(-3px); opacity: 0.9; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .footer { margin-top: 25px; font-size: 0.85rem; color: #b2bec3; font-weight: 500; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-circle">DGV</div>
        <h1>Dhaliwal Global Ventures</h1>
        <p>Your partner in Global Trading, Export-Import & Business Consultancy.</p>
        
        <div class="btn-container">
            <a href="https://www.instagram.com/Dhaliwalglobal_official" class="btn btn-insta" target="_blank">Follow on Instagram</a>
            
            <a href="mailto:globalventuresdhaliwal@gmail.com" class="btn btn-email">Send an Email</a>
        </div>
        
        <div class="footer">
            📍 Sri Ganganagar, Rajasthan
        </div>
    </div>
</body>
</html>
