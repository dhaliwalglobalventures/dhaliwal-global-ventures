<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhaliwal Global Ventures</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle, #0d1b2a 0%, #000814 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; color: #fff;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            padding: 40px 30px; border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px; width: 90%; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }
        .logo-img {
            width: 160px; height: 160px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
        }
        h1 { margin: 10px 0; font-size: 1.6rem; color: #ffd700; text-transform: uppercase; letter-spacing: 1.5px; }
        .tagline { color: #8d99ae; font-style: italic; margin-bottom: 30px; font-size: 0.85rem; }
        .btn-container { display: flex; flex-direction: column; gap: 15px; }
        .btn {
            display: block; padding: 15px; border-radius: 50px;
            text-decoration: none; font-weight: 700; transition: 0.4s;
            font-size: 0.9rem; letter-spacing: 1px;
        }
        .btn-insta { 
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white; 
        }
        .btn-email { 
            background: transparent; border: 1.5px solid #ffd700; color: #ffd700; 
        }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .footer { margin-top: 35px; font-size: 0.75rem; color: #4a4e69; }
    </style>
</head>
<body>
    <div class="card">
        <img src="file_0000000088bc71fa9c117933d13a515d.png" alt="Dhaliwal Global Ventures" class="logo-img">
        
        <h1>Dhaliwal Global Ventures</h1>
        <div class="tagline">Powered by Vision, Driven by Success</div>
        
        <div class="btn-container">
            <a href="https://www.instagram.com/Dhaliwalglobal_official" class="btn btn-insta" target="_blank">FOLLOW ON INSTAGRAM</a>
            <a href="mailto:globalventuresdhaliwal@gmail.com" class="btn btn-email">CONTACT VIA EMAIL</a>
        </div>
        
        <div class="footer">📍 Sri Ganganagar, Rajasthan | Global Trading</div>
    </div>
</body>
</html>
