<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhaliwal Global Ventures</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
        }
        .logo-circle {
            width: 80px;
            height: 80px;
            background: #2d3436;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0 auto 20px;
        }
        h1 { color: #2d3436; margin-bottom: 10px; font-size: 1.8rem; }
        p { color: #636e72; line-height: 1.6; }
        .status {
            display: inline-block;
            background: #ffeaa7;
            color: #d63031;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .footer {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            font-size: 0.9rem;
            color: #2d3436;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-circle">DGV</div>
        <div class="status">COMING SOON</div>
        <h1>Dhaliwal Global Ventures</h1>
        <p>We are building a world-class platform for international business solutions. Stay tuned for our official launch!</p>
        <div class="footer">
            Global Trading • Business Consultancy • Export & Import
        </div>
    </div>
</body>
</html>
